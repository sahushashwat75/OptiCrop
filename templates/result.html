<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result - OptiCrop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell result-shell">
        <header class="topbar">
            <div>
                <h1 class="brand">OptiCrop</h1>
                <p class="tagline">Prediction Output</p>
            </div>
            <span class="badge success-badge">Completed</span>
        </header>

        <main class="result-wrapper">
            <section class="result-card">
                <p class="eyebrow">Recommendation Ready</p>
                <h2>Best crop for the given values</h2>
                <div class="prediction-box">
                    {{ prediction }}
                </div>
                <p class="result-note">
                    This recommendation is generated using the trained machine learning model based on the entered soil and climate values.
                </p>

                <div class="result-actions">
                    <a href="/" class="secondary-btn">Go Back</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
